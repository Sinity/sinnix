anchor_to_edges = true
position = "bottom"
icon_theme = "Papirus-Dark"
height = 40
layer = "top"

[margin]
top = 8
bottom = 8
left = 16
right = 16

[[start]]
type = "launcher"
favorites = [
  "qutebrowser",
  "kitty",
  "code",
  "zed",
  "discord",
  "steam"
]
show_names = false
show_icons = true

[[start]]
type = "workspaces"
all_monitors = false
favorites = ["1", "2", "3", "4", "9", "10"]
sort = "label"

[start.name_map]
1 = ""
2 = ""
3 = ""
4 = ""
9 = "󰭹"
10 = ""

[[center]]
type = "focused"

[center.truncate]
mode = "end"
max_length = 60

[[end]]
type = "bindmode"
truncate = "start"

[[end]]
type = "custom"
class = "audio-output"

[end.bar]
type = "button"
name = "audio"
label = "{{2000:~/.local/bin/audio-output-status | jq -r '.text'}}"
tooltip = "{{2000:~/.local/bin/audio-output-status | jq -r '.tooltip'}}"
on_click = "!~/.local/bin/toggle-audio-output"

[[end]]
type = "volume"
format = "{icon} {percentage}%"
max_volume = 120

[[end]]
type = "music"
player_type = "mpris"
format = "{title} — {artist}"

[end.truncate]
mode = "end"
max_length = 40

[[end]]
type = "label"
class = "battery"
label = "{{60000:~/.local/bin/batteries-json | jq -r '.text'}}"
tooltip = "{{60000:~/.local/bin/batteries-json | jq -r '.tooltip'}}"

[[end]]
type = "sys_info"
format = [
  " {cpu_percent}% •  {memory_percent}%"
]

[end.interval]
cpu = 3
memory = 10

[[end]]
type = "custom"
class = "quick-actions"

[end.bar]
type = "button"
label = ""
tooltip = "Quick actions"
on_click = "popup:toggle"

[[end.popup]]
type = "box"
orientation = "vertical"

[[end.popup.widgets]]
type = "button"
class = "quick-action"
label = "  OCR region"
on_click = "!~/.local/bin/ocr-region"

[[end.popup.widgets]]
type = "button"
class = "quick-action"
label = "  Screenshot"
on_click = "!~/.local/bin/screenshot-quick"

[[end.popup.widgets]]
type = "button"
class = "quick-action"
label = "  Research capture"
on_click = "!~/.local/bin/research-capture"

[[end]]
type = "clipboard"
max_items = 5

[[end]]
type = "notifications"
show_count = true

[[end]]
type = "tray"
icon_size = 18
spacing = 6

[[end]]
type = "clock"
format = "%a %d %b  %H:%M"
