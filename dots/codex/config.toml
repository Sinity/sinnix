# Canonical Codex home on this system is ~/.codex.
# Global instruction file is ~/.codex/AGENTS.md.
# Skills are managed from ~/.codex/skills via Home Manager.
# MCP servers are registry-generated into full/lean/browser profile files by
# modules/features/dev/mcp-servers.nix. The wrapper invokes the intended
# profile explicitly so lean sessions do not inherit the full MCP table.
model = "gpt-5.6-sol"
model_reasoning_effort = "high"
approval_policy = "never"
sandbox_mode = "danger-full-access"
project_doc_max_bytes = 262144
project_doc_fallback_filenames = ["CLAUDE.md"]
plan_mode_reasoning_effort = "xhigh"

[projects."/home/sinity"]
trust_level = "trusted"

[projects."/home/sinity/.gemini/tmp/polylogue"]
trust_level = "trusted"

[projects."/realm/project"]
trust_level = "trusted"

# Codex scopes trust per git-repo root, so the /realm/project parent above does
# not cover its sub-repos — declare each one we work in (config is read-only at
# runtime: it is generated by mcp-servers.nix merging this file with MCP entries,
# so trust must be declared here rather than written by Codex at runtime).
[projects."/realm/project/sinex"]
trust_level = "trusted"

[projects."/realm/project/sinnix"]
trust_level = "trusted"

[projects."/realm/project/sinity-lynchpin"]
trust_level = "trusted"

[projects."/realm/project/polylogue"]
trust_level = "trusted"

[projects."/realm/project/scribe-tap"]
trust_level = "trusted"

[projects."/realm/project/intercept-bounce"]
trust_level = "trusted"

[projects."/realm/project/knowledge-extract"]
trust_level = "trusted"

[projects."/realm/project/pwrank"]
trust_level = "trusted"

[projects."/realm/data/knowledgebase"]
trust_level = "trusted"

[projects."/realm/data/libraries/substack"]
trust_level = "trusted"

[projects."/realm/data/captures/comms/irc"]
trust_level = "trusted"

[projects."/neo-outer-realm/content/media"]
trust_level = "trusted"

[notice.model_migrations]
gpt-5-codex = "gpt-5.3-codex"

[tui]
status_line = ["current-dir", "model-with-reasoning", "context-remaining", "context-window-size", "five-hour-limit", "weekly-limit", "session-id"]

[tui.model_availability_nux]
"gpt-5.6-sol" = 4
"gpt-5.6-terra" = 4

[features]
rmcp_client = true
hooks = true
multi_agent = true
prevent_idle_sleep = true
apps = true
tui_app_server = true
js_repl = true

[plugins."google-calendar@openai-curated"]
enabled = false

[plugins."gmail@openai-curated"]
enabled = false

[plugins."canva@openai-curated"]
enabled = false

[plugins."github@openai-curated"]
enabled = true

[plugins."google-drive@openai-curated"]
enabled = false
