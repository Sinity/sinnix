# Noctalia shell configuration.
#
# Writable + live-editable: this file is symlinked out-of-store into
# ~/.config/noctalia/config.toml (see modules/features/desktop/noctalia.nix).
# Noctalia reads AND writes it, so changes in the Settings GUI persist back
# here and edits here apply on the next reload — no rebuild needed.
#
# v5 is alpha: these keys are a best-effort seed. The Settings GUI rewrites the
# file in its full, correct schema the first time you change anything there.
# Bar too small on this 4K display? Settings -> Bar -> Scale (it saves here).

[theme]
mode = "dark"
source = "wallpaper"
wallpaper_scheme = "m3-content"

[theme.templates]
enable_builtin_templates = true
builtin_ids = ["gtk3", "gtk4", "kitty", "qt", "hyprland"]
enable_community_templates = true
community_ids = ["zed", "yazi"]

[theme.templates.user.neovim]
enabled = true
input_path = "templates/nvim-matugen.lua"
output_path = "$XDG_STATE_HOME/noctalia/nvim/matugen.lua"
pre_hook = "mkdir -p \"${XDG_STATE_HOME:-$HOME/.local/state}/noctalia/nvim\""
post_hook = "pkill -SIGUSR1 nvim >/dev/null 2>&1 || true"

[wallpaper]
enabled = true
directory = "/home/sinity/wallpaper"

[wallpaper.automation]
enabled = true
interval_seconds = 120
order = "random"
recursive = true

# Bars are defined as [bar.<name>] tables (the default bar is "default").
# thickness is the bar height in px; Noctalia's default is 34, which is tiny on
# the 48" 4K panel at scale 1. Raise it here or in Settings -> Bar (persists here).
[bar.default]
position = "top"
thickness = 56

[notification]
enable_daemon = true
allowed_urgencies = [ "low", "normal", "critical" ]
blacklist = []
blacklist_allow_critical = true
collapse_on_dismiss = true
layer = "overlay"
monitors = []
position = "top-right"
scale = 1.0
show_actions = true
show_app_name = true
background_opacity = 0.96
