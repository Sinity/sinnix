# Tmux Configuration for Sinnix
# Optimized for Hyprland + Neovim integration

# True color support
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -ga terminal-overrides '*:Ss=\E[%p1%d q:Se=\E[ q'
set-environment -g COLORTERM "truecolor"

# Enable mouse support
set -g mouse on

# Set prefix to Ctrl-Space (more ergonomic than Ctrl-B)
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows on close
set -g renumber-windows on

# Activity monitoring
setw -g monitor-activity on
set -g visual-activity off

# Vi mode for copy mode
setw -g mode-keys vi
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection-and-cancel

# Pane navigation (vim-like)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Split panes with intuitive keys
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!"

# Status bar styling (minimal, matches Hyprland aesthetic)
set -g status-position top
set -g status-style 'bg=#1e1e2e fg=#cdd6f4'
set -g status-left '#[fg=#89b4fa,bold]#{session_name} '
set -g status-right '#[fg=#f38ba8]#{?client_prefix,PREFIX,}'
set -g status-left-length 50
set -g status-right-length 50

# Pane border colors
set -g pane-border-style 'fg=#45475a'
set -g pane-active-border-style 'fg=#89b4fa'

# Message styling
set -g message-style 'fg=#cdd6f4 bg=#313244'
set -g message-command-style 'fg=#cdd6f4 bg=#313244'

# Window status
setw -g window-status-current-style 'fg=#89b4fa,bold'
setw -g window-status-style 'fg=#6c7086'
setw -g window-status-format ' #I:#W '
setw -g window-status-current-format ' #I:#W '

# Aggressive resize
setw -g aggressive-resize on

# Faster command sequences
set -s escape-time 0

# History
set -g history-limit 50000

# Focus events for Neovim
set -g focus-events on
