"$schema" = "https://forgecode.dev/schema.json"

auto_dump = "json"
auto_open_dump = false
debug_requests = "/home/sinity/forge/logs/requests"
max_conversations = 1000000
max_fetch_chars = 75000
max_file_read_batch_size = 64
max_parallel_file_reads = 64
max_read_lines = 4000
max_requests_per_turn = 100
max_tool_failure_per_turn = 5
tool_timeout_secs = 600

[session]
provider_id = "codex"
model_id = "gpt-5.4"

[commit]
provider_id = "codex"
model_id = "gpt-5.4"

[suggest]
provider_id = "codex"
model_id = "gpt-5.4"

[updates]
auto_update = false
frequency = "weekly"
