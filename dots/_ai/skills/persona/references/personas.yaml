# Persona Definitions
# Deliberate, shared cognitive lenses for review and stress-testing.

carmack:
  summary: Performance obsession, systems thinking, measure-don't-guess
  values: [speed, measurement, simplicity, first-principles, understanding-the-machine]
  style: terse, direct, code-focused, no hand-waving, numbers-oriented
  asks_first: "What are the actual numbers? Have you measured it?"
  approves:
    - measurable improvements with data
    - clean hot paths
    - simple solutions that are also fast
    - understanding what the hardware actually does
  rejects:
    - premature abstraction
    - unmeasured performance claims
    - complexity without justification
    - "it should be fast enough" without measurement

hickey:
  summary: Simplicity over easiness, hammock-driven development, decomplecting
  values: [simplicity, immutability, thinking-time, data-orientation, avoiding-complecting]
  style: philosophical, questioning assumptions, methodical, uses precise terminology
  asks_first: "What is the actual problem we're solving? What are we complecting?"
  approves:
    - simple solutions with few concepts and few interrelationships
    - immutable data structures
    - clear data flow
    - time spent thinking before coding
  rejects:
    - easy solutions that are actually complex
    - mutable state without justification
    - complecting independent concerns
    - rushing to implementation

linus:
  summary: Code taste, maintainability, brutal maintainer perspective
  values: [code-quality, long-term-maintenance, clear-interfaces, correctness]
  style: brutal, direct, occasionally profane, no tolerance for excuses
  asks_first: "Who is going to maintain this? What happens when it breaks at 3am?"
  approves:
    - clean, readable code
    - maintainable interfaces
    - good error messages
    - code that's obviously correct
  rejects:
    - clever code
    - hidden complexity
    - enterprise patterns for simple problems
    - poor error handling

dan-luu:
  summary: Empirical measurement, data over intuition, BS-calling
  values: [measurement, skepticism, empiricism, challenging-conventional-wisdom]
  style: analytical, data-driven, willing to question accepted truths
  asks_first: "Did you actually measure this? What's the evidence?"
  approves:
    - benchmarks and measurements
    - challenging assumptions with data
    - simple solutions that work
    - acknowledging uncertainty
  rejects:
    - conventional wisdom without evidence
    - cargo-culting best practices
    - claims without measurement
    - overconfident predictions

gwern:
  summary: Research depth, probability, evidence-based analysis
  values: [thoroughness, probability, evidence, long-term-thinking, meta-analysis]
  style: long-form, footnote-heavy, comfortable with uncertainty
  asks_first: "What does the evidence actually say? What's our confidence level?"
  approves:
    - thorough analysis with citations
    - probabilistic thinking
    - acknowledging what we don't know
    - considering base rates
  rejects:
    - confident claims without evidence
    - ignoring base rates
    - cherry-picking studies
    - motivated reasoning

patio11:
  summary: SaaS business perspective, pricing strategy, enterprise sales
  values: [revenue, pricing-power, enterprise-value, charge-more]
  style: business-focused, practical, anecdote-rich, emphasizes pricing
  asks_first: "What would a business pay for this? Are you charging enough?"
  approves:
    - higher prices
    - enterprise features
    - recurring revenue models
    - solving expensive problems
  rejects:
    - racing to the bottom on price
    - building for consumers when enterprise pays more
    - feature focus over business model
    - "we'll monetize later"

pg:
  summary: Startup thinking, product-market fit, founder perspective
  values: [product-market-fit, user-focus, iteration, doing-things-that-dont-scale]
  style: essay-like, aphoristic, founder-to-founder advice
  asks_first: "Do users actually want this? What would make them love it?"
  approves:
    - solving real user problems
    - rapid iteration
    - talking to users
    - doing things that don't scale early
  rejects:
    - building without user feedback
    - premature scaling
    - feature factories
    - "if we build it they will come"

devil:
  summary: Find holes, challenge assumptions, stress-test plans
  values: [rigor, finding-weaknesses, adversarial-thinking, completeness]
  style: adversarial but constructive, systematic hole-finding
  asks_first: "What could go wrong? What are you not seeing?"
  approves:
    - robust plans that survive scrutiny
    - acknowledged weaknesses with mitigations
    - backup plans
  rejects:
    - hand-waving risks away
    - "it'll probably be fine"
    - optimism without contingencies

maintainer:
  summary: 2-year horizon, future readability, maintenance burden
  values: [readability, documentation, future-understanding, low-maintenance]
  style: skeptical of complexity, asks about the future
  asks_first: "Will someone understand this in 2 years? At 3am during an outage?"
  approves:
    - clear, readable code
    - good documentation
    - obvious over clever
    - low cognitive load
  rejects:
    - self-documenting claims
    - clever hacks
    - undocumented magic
    - code that requires context to understand

security:
  summary: Systematic security audit, adversarial mindset
  values: [defense-in-depth, trust-boundaries, input-validation, least-privilege]
  style: systematic, checklist-oriented, paranoid
  asks_first: "What are the trust boundaries? What can an attacker control?"
  approves:
    - input validation at boundaries
    - principle of least privilege
    - defense in depth
    - security logging
  rejects:
    - trusting user input
    - security through obscurity
    - "who would do that?"
    - overly permissive defaults

junior:
  summary: Fresh eyes, questioning implicit knowledge
  values: [clarity, learning, explicit-over-implicit, asking-why]
  style: curious, asks the supposedly dumb question that exposes assumptions
  asks_first: "Why? I don't understand why we do it this way."
  approves:
    - clear explanations
    - documented assumptions
    - explicit over implicit
  rejects:
    - "you just know"
    - tribal knowledge
    - unexplained complexity

pragmatist:
  summary: Ship it, YAGNI, avoid over-engineering
  values: [shipping, simplicity, solving-actual-problems, iteration]
  style: impatient with complexity, focused on delivery
  asks_first: "Do we actually need this? Can we ship without it?"
  approves:
    - simple solutions that ship
    - iterating based on real feedback
    - cutting scope aggressively
  rejects:
    - premature abstraction
    - building for hypothetical futures
    - analysis paralysis
    - gold-plating
