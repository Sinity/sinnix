# ===================================================================
# Basic Options
# ===================================================================

# Preview settings
set preview_images true
set preview_images_method ueberzug
set use_preview_script true
set preview_max_size 40000000  # ~40MB limit for previews

# UI preferences
set column_ratios 1,3,4
set unicode_ellipsis true
set draw_borders both
set tilde_in_titlebar true
set padding_right true

# Behavior settings
set vcs_aware true
set vcs_backend_git enabled
set show_hidden true
set collapse_preview false

# Sorting preferences
set sort_case_insensitive true
set sort_directories_first true
set sort_unicode true

# History settings
set max_history_size 20
set max_console_history_size 50

# Other settings
set mouse_enabled true
set hidden_filter ^\\..*
set confirm_on_delete multiple
set open_all_images true

# ===================================================================
# Custom Key Mappings
# ===================================================================

# Navigation
map K move up=0.5 pages=True
map J move down=0.5 pages=True

# File operations
map <DELETE> console delete
map <F7> console mkdir 
map <F8> console delete
map DD shell mv %s ~/.local/share/Trash/files/
map ex shell atool -x %f
map cc shell zip -r %f.zip %s

# Media playback
map V chain shell mpv --vo=kitty --profile=sw-fast %s; reload_dir

# Toggle metadata display in preview
map M chain set preview_metadata!; reload_cwd

# ===================================================================
# Command Aliases
# ===================================================================

alias e edit
alias q quit
alias Q quitall
alias ! shell
alias / search
alias ? search