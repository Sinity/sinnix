[database]
url = "postgresql:///sinex?host=/run/postgresql&user=sinity"
max_connections = 5

[logging]
level = "info"
format = "json"

[kitty]
socket_path = "/tmp/kitty-*"
polling_interval_secs = 5
command_timeout_secs = 30
heartbeat_interval_secs = 60
capture_commands = true
capture_output = true
shell_integration = true
