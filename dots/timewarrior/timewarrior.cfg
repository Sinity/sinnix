# Advanced Timewarrior Configuration
# Location: /realm/project/sinnix/dots/timewarrior/timewarrior.cfg

# General Settings
confirmation = no
verbose = yes
debug = off
debug.indicator = >>

# Date and Time
dateformat = Y-M-D H:N:S

# Reports Configuration
reports.range = all

# Summary Report
reports.summary.annotations = yes
reports.summary.holidays = yes
reports.summary.ids = no
reports.summary.tags = yes
reports.summary.range = day
reports.summary.weekdays = yes
reports.summary.weeks = yes

# Day Report Configuration
reports.day.cell = 15
reports.day.day = yes
reports.day.holidays = yes
reports.day.hours = auto
reports.day.lines = 1
reports.day.month = yes
reports.day.spacing = 1
reports.day.axis = internal
reports.day.summary = on
reports.day.totals = on
reports.day.week = yes
reports.day.weekday = yes
reports.day.range = day

# Week Report Configuration
reports.week.cell = 15
reports.week.day = yes
reports.week.holidays = yes
reports.week.hours = auto
reports.week.lines = 1
reports.week.month = yes
reports.week.spacing = 1
reports.week.axis = external
reports.week.summary = on
reports.week.totals = on
reports.week.week = yes
reports.week.weekday = yes
reports.week.range = week

# Month Report Configuration
reports.month.cell = 15
reports.month.day = yes
reports.month.holidays = yes
reports.month.hours = auto
reports.month.lines = 1
reports.month.month = yes
reports.month.spacing = 1
reports.month.axis = external
reports.month.summary = on
reports.month.totals = on
reports.month.week = yes
reports.month.weekday = yes
reports.month.range = month

# Work Exclusions (non-work hours)
define exclusions:
  monday    = <8:00 12:00-13:00 >18:00
  tuesday   = <8:00 12:00-13:00 >18:00
  wednesday = <8:00 12:00-13:00 >18:00
  thursday  = <8:00 12:00-13:00 >18:00
  friday    = <8:00 12:00-13:00 >18:00
  saturday  = <10:00 >14:00
  sunday    = <10:00 >14:00

  days:

# Tag Metadata and Budgets
define tags:
  "work":
    description = "Work-related tasks"
    budget = 40 hours per week

  "coding":
    description = "Software development and coding"
    budget = 25 hours per week

  "meetings":
    description = "Meetings and calls"
    budget = 10 hours per week

  "learning":
    description = "Learning and professional development"
    budget = 5 hours per week

  "writing":
    description = "Documentation and writing"
    budget = 5 hours per week

  "admin":
    description = "Administrative tasks"
    budget = 5 hours per week

  "research":
    description = "Research and investigation"
    budget = 10 hours per week

  "personal":
    description = "Personal projects and tasks"

  "exercise":
    description = "Exercise and physical activity"
    budget = 5 hours per week

  "reading":
    description = "Reading books and articles"
    budget = 5 hours per week

# Custom Theme
include /realm/project/sinnix/dots/timewarrior/themes/custom-dark.theme

# Hints
define hints:
  work:
    tag "work"

  dev:
    tag "coding"
    tag "work"

  meeting:
    tag "meetings"
    tag "work"

  learn:
    tag "learning"

  personal:
    tag "personal"

  break:
    tag "break"

# Rules
define rules:
  on_modify:
    run /realm/project/sinnix/dots/timewarrior/extensions/on-modify.timewarrior
