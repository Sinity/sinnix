# Mouse controls
MBTN_LEFT     ignore
MBTN_LEFT_DBL cycle fullscreen
MBTN_RIGHT    cycle pause
WHEEL_UP      seek 10
WHEEL_DOWN    seek -10

# Seeking controls
l               seek 1 keyframes
h               seek -1 keyframes
Shift+l         no-osd seek 10 keyframes
Shift+h         no-osd seek -10 keyframes
ctrl+l          frame-step
ctrl+h          frame-back-step
alt+l           frame-step
alt+h           frame-back-step

# Chapter navigation
j               add chapter 1
k               add chapter -1

# Playlist controls
shift+j         playlist-next
shift+k         playlist-prev

# Playback controls
SPACE           cycle pause
m               cycle mute
f               cycle fullscreen
ESC             set fullscreen no
o               ab-loop
i               script-binding stats/display-stats-toggle
p               script-message osc-visibility auto
P               script-message osc-visibility always

# Video filters
v               vf toggle @fps_anime ; vf toggle @fps_film
V               vf set ""

# Quit controls
q               quit
Q               quit-watch-later
ctrl+c          quit

# Subtitle and audio track cycling
s               cycle sub
S               cycle sub down
a               cycle audio
A               cycle audio down

# Playback speed controls
[               multiply speed 0.9091
]               multiply speed 1.1
{               multiply speed 0.5
}               multiply speed 2.0
BS              set speed 1.0

# Subtitle sync
alt+-           add sub-delay -0.1
alt++           add sub-delay +0.1

# Audio sync
ctrl++          add audio-delay 0.100
ctrl+-          add audio-delay -0.100

# Video zoom and pan
z               add video-zoom 0.1
Z               add video-zoom -0.1
alt+BS          set video-zoom 0 ; set video-pan-x 0 ; set video-pan-y 0