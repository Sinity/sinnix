# FZF default command
export FZF_DEFAULT_COMMAND="fd --hidden --strip-cwd-prefix --exclude .git"

# FZF default options with theme
export FZF_DEFAULT_OPTS="--color=fg:-1,fg+:#FBF1C7,bg:-1,bg+:#282828 --color=hl:#98971A,hl+:#B8BB26,info:#928374,marker:#D65D0E --color=prompt:#CC241D,spinner:#689D6A,pointer:#D65D0E,header:#458588 --color=border:#665C54,label:#aeaeae,query:#FBF1C7 --border='rounded' --border-label='' --preview-window='border-rounded' --prompt='> ' --marker='>' --pointer='>' --separator='─' --scrollbar='│' --info='right'"

# File widget options
export FZF_CTRL_T_OPTS="--preview 'if [ -d {} ]; then eza --tree --color=always {} | head -200; else bat -n --color=always --line-range :500 {}; fi'"

# Change directory widget command and options
export FZF_ALT_C_COMMAND="fd --type=d --hidden --strip-cwd-prefix --exclude .git"
export FZF_ALT_C_OPTS="--preview 'eza --tree --color=always {} | head -200'"
