project_name: sinnix
languages:
  - nix
  - bash
  - python
encoding: utf-8
line_ending: lf
language_backend: LSP
ignore_all_files_in_gitignore: true
ignored_paths:
  - .cache
  - .direnv
  - .git
  - .mypy_cache
  - .pytest_cache
  - .ruff_cache
  - .venv
  - result
  - result-*
read_only: false
excluded_tools: []
included_optional_tools: []
fixed_tools: []
initial_prompt: |
  This is the Sinnix NixOS configuration repository. Respect the module
  taxonomy in CLAUDE.md/AGENTS.md, keep changes declarative, and prefer the
  existing Nix/Home Manager patterns for agent tooling and MCP integration.
base_modes:
default_modes:
symbol_info_budget:
read_only_memory_patterns: []
ignored_memory_patterns: []
ls_specific_settings: {}
added_modes:
additional_workspace_folders: []
