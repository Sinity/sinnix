[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "sinnix-observe"
version = "0.1.0"
description = "Agent-readable workstation observability report (Sinnix)"
requires-python = ">=3.12"

[project.scripts]
sinnix-observe = "sinnix_observe.cli:main"

[tool.setuptools.packages.find]
include = ["sinnix_observe*"]
