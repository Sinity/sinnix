[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "sinnix-sentinel"
version = "0.1.0"
description = "Python port of the sinnix-sentinel system-health monitor (observe-only by default)."
requires-python = ">=3.11"

[project.scripts]
sinnix-sentinel-py = "sinnix_sentinel.cli:main"

[tool.setuptools.packages.find]
include = ["sinnix_sentinel*"]
exclude = ["tests*"]
