[tool.ruff]
line-length = 88

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "C4",  # flake8-comprehensions (explicit, avoids pulling in C901)
    "B",   # flake8-bugbear
]
ignore = ["E501"] # line length handled by formatter
