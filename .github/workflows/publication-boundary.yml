name: Publication boundary

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    # Automatic runs begin when the repository becomes public. A private
    # workflow_dispatch remains available for deliberate pre-publication runs.
    if: ${{ github.event_name == 'workflow_dispatch' || github.repository_visibility == 'public' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Enforce repository path boundary
        run: scripts/check-publication-boundary

      - name: Scan Git history for secrets
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
