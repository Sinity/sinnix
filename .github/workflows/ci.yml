name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    # Automatic runs begin when the repository becomes public. A private
    # workflow_dispatch remains available for deliberate pre-publication runs.
    if: ${{ github.event_name == 'workflow_dispatch' || github.repository_visibility == 'public' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install Nix
        uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c # v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            extra-substituters = https://numtide.cachix.org https://sinity.cachix.org
            extra-trusted-public-keys = numtide.cachix.org-1:2ps1kLBUWjxIneOy1Ik6cQjb41X0iXVXeHigGmycPPE= sinity.cachix.org-1:i5YsUuuRv9r790gdwwE+FiJiUcWULV1lEOmKE50Y+TI=

      - name: Check Nix formatting
        run: nix fmt -- --fail-on-change

      - name: Run flake checks (includes nixosTests)
        run: nix flake check
