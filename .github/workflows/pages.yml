name: GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - ".beads/issues.jsonl"
      - ".github/workflows/pages.yml"
      - "docs/site/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Build project site
        uses: Sinity/polylogue/.github/actions/project-pages@55f843267f3c5c64773a125a2bf767e8c1a216df
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: .cache/site
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
